<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="32" cy="32" r="30" fill="url(#grad)"/>

  <!-- 简化的 P -->
  <g transform="translate(32, 30)" fill="white">
    <rect x="-10" y="-14" width="6" height="28" rx="2"/>
    <path d="M -4 -14 L 2 -14 Q 12 -14, 12 -5 Q 12 4, 2 4 L -4 4"
          fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- 小车 -->
  <g transform="translate(32, 48)" fill="white">
    <rect x="-10" y="-4" width="20" height="6" rx="2" opacity="0.9"/>
    <circle cx="-6" cy="3" r="2" opacity="0.7"/>
    <circle cx="6" cy="3" r="2" opacity="0.7"/>
  </g>
</svg>