<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 主渐变 - 蓝色 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.3" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#2563eb" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 外圆背景 -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)" />
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.5"/>

  <!-- 停车牌 P 字母 -->
  <g transform="translate(100, 95)" filter="url(#shadow)">
    <!-- P 的竖线 -->
    <rect x="-35" y="-45" width="20" height="90" rx="4" fill="url(#mainGradient)"/>
    <!-- P 的圆弧 -->
    <path d="M -15 -45
             L 5 -45
             Q 35 -45, 35 -20
             Q 35 5, 5 5
             L -15 5"
          fill="none"
          stroke="url(#mainGradient)"
          stroke-width="20"
          stroke-linecap="round"/>
  </g>

  <!-- 底部小车图标 -->
  <g transform="translate(100, 155)">
    <!-- 车身 -->
    <rect x="-30" y="-10" width="60" height="18" rx="6" fill="#64748b"/>
    <!-- 车顶 -->
    <path d="M -22 -10 L -18 -18 L 18 -18 L 22 -10 Z" fill="#475569"/>
    <!-- 车灯 -->
    <circle cx="-20" cy="-2" r="3" fill="#fbbf24"/>
    <circle cx="20" cy="-2" r="3" fill="#ef4444"/>
    <!-- 车轮 -->
    <circle cx="-18" cy="8" r="5" fill="#1e293b"/>
    <circle cx="18" cy="8" r="5" fill="#1e293b"/>
  </g>
</svg>