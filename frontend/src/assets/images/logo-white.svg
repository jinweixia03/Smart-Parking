<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 白色版本光效 -->
    <linearGradient id="whiteGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.4" />
    </linearGradient>

    <!-- 白色背景渐变 -->
    <linearGradient id="whiteBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- 外圆背景 -->
  <circle cx="100" cy="100" r="92" fill="url(#whiteBg)" />
  <circle cx="100" cy="100" r="88" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>

  <!-- 主图标组 -->
  <g transform="translate(100, 100)">
    <!-- 停车牌底座 -->
    <rect x="-45" y="-50" width="90" height="100" rx="14" fill="white"/>

    <!-- 高光效果 -->
    <rect x="-38" y="-44" width="76" height="40" rx="10" fill="url(#whiteGlow)" opacity="0.3"/>

    <!-- P 字母（使用主题色） -->
    <g transform="translate(0, -5)">
      <rect x="-22" y="-32" width="14" height="64" rx="3" fill="#6366f1"/>
      <path d="M -8 -32
               L 2 -32
               Q 24 -32, 24 -16
               Q 24 0, 2 0
               L -8 0"
            fill="none"
            stroke="#6366f1"
            stroke-width="14"
            stroke-linecap="round"
            stroke-linejoin="round"/>
    </g>

    <!-- 底部横线 -->
    <rect x="-30" y="42" width="60" height="6" rx="3" fill="#8b5cf6" opacity="0.6"/>

  </g>

  <!-- 装饰点 -->
  <circle cx="38" cy="50" r="4" fill="white" opacity="0.6"/>
  <circle cx="162" cy="150" r="4" fill="white" opacity="0.6"/>

</svg>
