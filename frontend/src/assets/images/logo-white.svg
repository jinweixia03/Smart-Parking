<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 停车牌 P 字母 - 白色 -->
  <g transform="translate(100, 95)" filter="url(#shadow)">
    <rect x="-35" y="-45" width="20" height="90" rx="4" fill="white"/>
    <path d="M -15 -45 L 5 -45 Q 35 -45, 35 -20 Q 35 5, 5 5 L -15 5"
          fill="none" stroke="white" stroke-width="20" stroke-linecap="round"/>
  </g>

  <!-- 底部小车图标 - 白色 -->
  <g transform="translate(100, 155)">
    <rect x="-30" y="-10" width="60" height="18" rx="6" fill="white" opacity="0.9"/>
    <path d="M -22 -10 L -18 -18 L 18 -18 L 22 -10 Z" fill="white" opacity="0.7"/>
    <circle cx="-20" cy="-2" r="3" fill="#fbbf24"/>
    <circle cx="20" cy="-2" r="3" fill="#f87171"/>
    <circle cx="-18" cy="8" r="5" fill="white" opacity="0.6"/>
    <circle cx="18" cy="8" r="5" fill="white" opacity="0.6"/>
  </g>
</svg>