server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: smart-parking-system

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smart_parking?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      pool-name: HikariCP

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.parking.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    multiple-result-sets-enabled: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT Configuration
jwt:
  secret: parking-system-secret-key-2024
  expiration: 86400000  # 24 hours
  refresh-expiration: 604800000  # 7 days

# Algorithm Service
algorithm:
  service:
    url: http://localhost:5000
  detect:
    conf-threshold: 0.5
  recognize:
    conf-threshold: 0.8

# File Upload Configuration
upload:
  # 上传目录（相对路径，指向项目根目录下的 uploads 文件夹）
  path: uploads
  # 访问URL前缀
  url-prefix: /uploads

# File Storage (兼容旧配置)
storage:
  type: local
  local:
    path: uploads
    url-prefix: /uploads

# Parking Configuration
parking:
  free-minutes: 15
  max-daily-fee: 50.00

# Logging
logging:
  level:
    com.parking: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/parking-system.log

---
spring:
  config:
    activate:
      on-profile: dev

server:
  port: 8080

logging:
  level:
    com.parking: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

server:
  port: 8080

logging:
  level:
    com.parking: INFO
  file:
    name: /var/log/parking-system/application.log
